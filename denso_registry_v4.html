// Storage helpers with fallback to localStorage
const save=async(k,v)=>{
  try{ if(window.storage) await window.storage.set(k,JSON.stringify(v),true); }catch(e){}
  try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
};
const load=async(k,fb)=>{
  try{ if(window.storage){const r=await window.storage.get(k,true);if(r)return JSON.parse(r.value);} }catch(e){}
  try{ const r=localStorage.getItem(k);if(r)return JSON.parse(r); }catch(e){}
  return fb;
};
const uid=()=>"x"+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
const devKey=()=>{let k=localStorage.getItem("dtk");if(!k){k=uid();localStorage.setItem("dtk",k);}return k;};
const avgR=(ss,tid)=>{const s=ss.filter(x=>x.trainerId===tid&&x.ratingCount>0);return s.length?(s.reduce((a,x)=>a+x.rating,0)/s.length).toFixed(1):null;};
const totalH=(ss,cs,tid)=>ss.filter(x=>x.trainerId===tid).reduce((a,s)=>{const c=cs.find(x=>x.id===s.courseId);return a+(c?c.duration:7);},0);
const tScore=(t,ss,cs)=>{
  const h=Math.min(totalH(ss,cs,t.id),100);
  const r=parseFloat(avgR(ss,t.id)||0)*20;
  const ce=t.courseIds.length*10;
  const co=COMP.reduce((a,k)=>a+(t.competencies?.[k]||0),0)/(COMP.length*5)*30;
  return Math.round(h*.3+r*.3+ce*.2+co*.2);
};
const mLeft=(d,m)=>Math.round((new Date(d).setMonth(new Date(d).getMonth()+m)-Date.now())/(1000*60*60*24*30));
const eb=m=>m<0?{lb:"หมดอายุ",c:C.RD,bg:C.RDB}:m<3?{lb:m+"เดือน",c:C.AM,bg:C.AMB}:{lb:m+"เดือน",c:C.GR,bg:C.GRB};

// ---- HRD PANEL ----
function HRD({data,setData,onClose}){
  const {trainers,courses,sessions,bookings}=data;
  const [tab,st]=useState("trainers");
  const [eT,seT]=useState(null);
  const [eC,seC]=useState(null);
  const [eS,seS]=useState(null);
  const [code,sc]=useState("");
  const [msg,sm]=useState(null);
  const pending=bookings.filter(b=>b.status==="pending").length;
  const expiring=trainers.filter(t=>t.active).flatMap(t=>
    t.courseIds.map(cid=>{const co=courses.find(x=>x.id===cid);if(!co)return null;const m=mLeft(t.certDate,co.renewMonths);return m<=3?{t,co,m}:null;}).filter(Boolean)
  );
  const TABS=[["trainers",`👤 วิทยากร`],["courses",`📚 หลักสูตร`],["sessions",`📅 Class`],["bookings",`📩 จอง${pending>0?" ("+pending+")":""}`],["expiry",`⏰ ต่ออายุ${expiring.length>0?" ("+expiring.length+")":""}`]];

  const saveT=async t=>{const up=trainers.some(x=>x.id===t.id)?trainers.map(x=>x.id===t.id?t:x):[...trainers,t];await save("v3_trainers",up);setData(d=>({...d,trainers:up}));seT(null);};
  const delT=async id=>{if(!confirm("ลบวิทยากรนี้?"))return;const up=trainers.filter(x=>x.id!==id);await save("v3_trainers",up);setData(d=>({...d,trainers:up}));seT(null);};
  const saveC=async c=>{const up=courses.some(x=>x.id===c.id)?courses.map(x=>x.id===c.id?c:x):[...courses,c];await save("v3_courses",up);setData(d=>({...d,courses:up}));seC(null);};
  const delC=async id=>{if(!confirm("ลบหลักสูตรนี้?"))return;const up=courses.filter(x=>x.id!==id);await save("v3_courses",up);setData(d=>({...d,courses:up}));seC(null);};
  const saveS=async s=>{const up=sessions.some(x=>x.id===s.id)?sessions.map(x=>x.id===s.id?s:x):[...sessions,s];await save("v3_sessions",up);setData(d=>({...d,sessions:up}));seS(null);};
  const delS=async id=>{if(!confirm("ลบ Class นี้?"))return;const up=sessions.filter(x=>x.id!==id);await save("v3_sessions",up);setData(d=>({...d,sessions:up}));seS(null);};
  const confirmBook=async b=>{
    const upB=bookings.map(x=>x.id===b.id?{...x,status:"confirmed"}:x);
    const newS={id:uid(),trainerId:b.trainerId,courseId:b.courseId,date:b.date,location:b.dept,attendees:Number(b.attendees)||0,rating:0,ratingCount:0};
    const upS=[...sessions,newS];
    await save("v3_bookings",upB);await save("v3_sessions",upS);
    setData(d=>({...d,bookings:upB,sessions:upS}));
  };
  const renewCert=async tid=>{const up=trainers.map(t=>t.id===tid?{...t,certDate:new Date().toISOString().slice(0,10)}:t);await save("v3_trainers",up);setData(d=>({...d,trainers:up}));};
  const mkCode=(sid,stars)=>{const s6=sid.slice(-6).toUpperCase();let h=0;for(const c of sid+"|"+stars)h=(h*31+c.charCodeAt(0))>>>0;return"DTT-"+s6+"-"+stars+"-"+h.toString(36).toUpperCase().slice(-4);};
  const redeem=async()=>{
    const m=code.trim().toUpperCase().match(/^DTT-([A-Z0-9]+)-([1-5])-([A-Z0-9]+)$/);
    if(!m){sm({ok:false,t:"Code ไม่ถูกต้อง"});return;}
    const[,s6,sStr]=m;const stars=parseInt(sStr);
    const sess=sessions.find(s=>s.id.slice(-6).toUpperCase()===s6);
    if(!sess){sm({ok:false,t:"ไม่พบ Session"});return;}
    if(mkCode(sess.id,stars).split("-")[3]!==m[3]){sm({ok:false,t:"Code ไม่ถูกต้อง"});return;}
    const allR=await load("v3_ratings",[]);
    if(allR.some(r=>r.code===code.trim().toUpperCase())){sm({ok:false,t:"Code ใช้แล้ว"});return;}
    const upR=[...allR,{sessionId:sess.id,stars,code:code.trim().toUpperCase(),ts:Date.now()}];
    const sR=upR.filter(r=>r.sessionId===sess.id);
    const avg=parseFloat((sR.reduce((a,r)=>a+r.stars,0)/sR.length).toFixed(1));
    const upS=sessions.map(s=>s.id===sess.id?{...s,rating:avg,ratingCount:sR.length}:s);
    await save("v3_ratings",upR);await save("v3_sessions",upS);
    setData(d=>({...d,sessions:upS}));

          <button onClick={()=>seC(co)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+C.LN,background:"#fff",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>
        </div>)}
        {eC!==null&&<Modal onClose={()=>seC(null)} w={460}><MHead title={eC.id?"✏️ แก้ไขหลักสูตร":"➕ เพิ่มหลักสูตร"} onClose={()=>seC(null)}/><CourseForm course={eC.id?eC:undefined} onSave={saveC} onDel={delC} onClose={()=>seC(null)}/></Modal>}

        {eS!==null&&<Modal onClose={()=>seS(null)} w={460}><MHead title={eS.id?"✏️ แก้ไข Class":"➕ บันทึก Class"} onClose={()=>seS(null)}/><SessionForm session={eS.id?eS:undefined} trainers={trainers} courses={courses} onSave={saveS} onDel={delS} onClose={()=>seS(null)}/></Modal>}
      </div>}

      {/* BOOKINGS */}
      {tab==="bookings"&&<div style={{paddingTop:4}}>
        {bookings.length===0?<div style={{textAlign:"center",padding:32,color:C.MU}}>ยังไม่มีคำขอ</div>
          :bookings.map(b=>{

                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:99,fontWeight:700,background:done?C.GRB:C.AMB,color:done?C.GR:C.AM}}>{done?"ยืนยันแล้ว":"รอดำเนินการ"}</span>
                  {!done&&<Btn onClick={()=>confirmBook(b)} variant="green" style={{fontSize:11,padding:"4px 9px"}}>✅ ยืนยัน</Btn>}
                </div>
              </div>
            </div>;
          })}
      </div>}

      {/* EXPIRY */}
      {tab==="expiry"&&<div style={{paddingTop:4}}>
        {expiring.length===0?<div style={{textAlign:"center",padding:24,color:C.GR}}>✅ ไม่มีรายการใกล้หมดอายุ</div>
          :expiring.map(({t,co,m},i)=>{const s=eb(m);return(
            <div key={i} style={{background:"#fff",borderRadius:9,padding:11,marginBottom:8,border:"1.5px solid "+s.c+"44"}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7}}>
                <Av name={t.name} size={32}/>
                <div><div style={{fontWeight:700,color:C.N,fontSize:13}}>{t.name}</div><div style={{fontSize:11,color:C.MU}}>{co.name}</div></div>
                <span style={{marginLeft:"auto",fontSize:11,background:s.bg,color:s.c,padding:"2px 8px",borderRadius:99,fontWeight:700}}>{m<0?"หมดอายุ":"เหลือ "+s.lb}</span>
              </div>
              <Btn onClick={()=>renewCert(t.id)} style={{width:"100%",fontSize:12}}>🔄 ต่ออายุวันนี้</Btn>
            </div>);})}
      </div>}
    </div>
  </Modal>;
}

// ---- MAIN APP ----
function App(){
  const [D,sD]=useState({trainers:[],courses:[],sessions:[],bookings:[],ratings:[]});
  const [ok,sok]=useState(false);
  const [tab,st]=useState("dir");
  const [search,ss]=useState("");
  const [cat,scat]=useState("ทั้งหมด");
  const [profile,sp]=useState(null);
  const [book,sb]=useState(null);
  const [bookOK,sbOK]=useState(null);
  const [rate,sr]=useState(null);
  const [hrd,sh]=useState(false);
  const [pin,spm]=useState(false);
  const [pv,spv]=useState("");
  const [pe,spe]=useState(false);

  useEffect(()=>{(async()=>{
    try{
      let t=await load("v3_trainers",null);if(!t){t=ST;await save("v3_trainers",t);}
      let c=await load("v3_courses",null);if(!c){c=SC;await save("v3_courses",c);}
      let s=await load("v3_sessions",null);if(!s){s=SS;await save("v3_sessions",s);}
      let b=await load("v3_bookings",null);if(!b){b=[];await save("v3_bookings",b);}
      let r=await load("v3_ratings",[]);
      sD({trainers:t,courses:c,sessions:s,bookings:b,ratings:r});
    }catch(e){sD({trainers:ST,courses:SC,sessions:SS,bookings:[],ratings:[]});}
    sok(true);
  })();},[]);

  const submitRating=async(sid,stars,comment,dk)=>{
    const upR=[...D.ratings,{sessionId:sid,stars,comment,deviceKey:dk,ts:Date.now()}];
    const sR=upR.filter(r=>r.sessionId===sid);
    const avg=parseFloat((sR.reduce((a,r)=>a+r.stars,0)/sR.length).toFixed(1));
    const upS=D.sessions.map(s=>s.id===sid?{...s,rating:avg,ratingCount:sR.length}:s);
    await save("v3_ratings",upR);await save("v3_sessions",upS);
    sD(d=>({...d,ratings:upR,sessions:upS}));sr(null);
  };
  const saveBook=async f=>{
    const id="BK"+String(Date.now()).slice(-5);
    const nb={...f,id,status:"pending",createdAt:new Date().toISOString().slice(0,10)};
    const up=[...D.bookings,nb];
    await save("v3_bookings",up);sD(d=>({...d,bookings:up}));sb(null);sbOK(id);
  };

  if(!ok)return <div style={{padding:60,textAlign:"center",color:C.MU,fontSize:15}}>⏳ กำลังโหลด...</div>;

  const {trainers,courses,sessions,bookings,ratings}=D;
  const ranked=[...trainers].filter(t=>t.active).sort((a,b)=>tScore(b,sessions,courses)-tScore(a,sessions,courses));
  const filtered=trainers.filter(t=>{
    if(!t.active)return false;
    if(search&&!t.name.includes(search)&&!t.dept.includes(search))return false;
    if(cat!=="ทั้งหมด"&&!t.courseIds.some(cid=>courses.find(x=>x.id===cid)?.category===cat))return false;
    return true;
  });
  const totalAtt=sessions.reduce((a,s)=>a+(s.attendees||0),0);
  const rSess=sessions.filter(x=>x.ratingCount>0);
  const avgSc=rSess.length?(rSess.reduce((a,x)=>a+x.rating,0)/rSess.length).toFixed(1):null;
  const pending=bookings.filter(b=>b.status==="pending").length;
  const M=["🥇","🥈","🥉"];
  const upcoming=sessions.filter(s=>new Date(s.date)>new Date()).sort((a,b)=>a.date.localeCompare(b.date));
  const past=sessions.filter(s=>new Date(s.date)<=new Date()).sort((a,b)=>b.date.localeCompare(a.date));

  return <div style={{background:C.BG,minHeight:600,fontFamily:"'Sarabun',sans-serif,sans-serif"}}>
    {/* Header */}
    <div style={{background:C.N}}>
      <div style={{height:3,background:`linear-gradient(90deg,${C.G},${C.GL},${C.G})`}}/>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>🎓</span>
          <div><div style={{color:"#fff",fontWeight:800,fontSize:14}}>Certified Trainer Registry</div><div style={{color:"rgba(245,230,192,.5)",fontSize:10}}>DENSO TEN (THAILAND)</div></div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {pending>0&&<span style={{fontSize:11,padding:"3px 9px",borderRadius:99,background:C.RD,color:"#fff",fontWeight:700}}>📩 {pending}</span>}
          <button onClick={()=>spm(true)} style={{padding:"5px 13px",border:"1px solid rgba(255,255,255,.2)",borderRadius:7,cursor:"pointer",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.8)",fontSize:12,fontFamily:"inherit"}}>⚙️ HRD</button>
        </div>
      </div>
    </div>
    {/* Stats bar */}
    <div style={{background:"#162C55",borderBottom:"1px solid #1D3A6E"}}>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"7px 14px",display:"flex",gap:18,flexWrap:"wrap"}}>
        {[[trainers.filter(t=>t.active).length,"🎓","Trainers"],[courses.length,"📚","หลักสูตร"],[sessions.length,"📅","Class"],[totalAtt,"👥","ผู้เรียน"],[avgSc||"—","⭐","คะแนนเฉลี่ย"]].map(([v,ic,lb])=>(
          <div key={lb} style={{display:"flex",alignItems:"center",gap:5}}>

    </div>
    {/* Tabs */}

        ))}

          <p style={{margin:"3px 0 0",color:C.MU,fontSize:12}}>คลิกการ์ดดูโปรไฟล์ · ประวัติ · สมรรถนะ · จองวิทยากร</p>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
          <input placeholder="🔍 ค้นหา" value={search} onChange={e=>ss(e.target.value)} style={{...IS,width:170,flex:"none"}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {["ทั้งหมด","Production","Quality","Safety","HR","Engineering"].map(c=>(

            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,marginBottom:28}}>
          {filtered.map(tr=>{
            const rk=ranked.findIndex(x=>x.id===tr.id)+1;
            const rat=avgR(sessions,tr.id);const hrs=totalH(sessions,courses,tr.id);
            const ms=sessions.filter(s=>s.trainerId===tr.id);
            return <div key={tr.id} onClick={()=>sp(tr)}
              style={{background:"#fff",borderRadius:12,padding:16,cursor:"pointer",border:"1px solid "+C.LN,position:"relative",transition:"transform .15s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${C.G}00,${C.G},${C.G}00)`,borderRadius:"12px 12px 0 0"}}/>
              {rk<=3&&<div style={{position:"absolute",top:8,right:10,fontSize:18}}>{M[rk-1]}</div>}
              <div style={{display:"flex",gap:11,alignItems:"flex-start",marginBottom:10}}>
                <Av name={tr.name} size={46}/>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:C.N}}>{tr.name}</div>
                  <div style={{fontSize:11,color:C.MU}}>{tr.dept}</div>
                  <span style={{fontSize:10,background:C.GL,color:C.AM,display:"inline-block",padding:"1px 6px",borderRadius:3,fontWeight:700,marginTop:2}}>{tr.certNo}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:5,marginBottom:10}}>
                {[[ms.length+" class",C.BL],[hrs+"h",C.GR],[rat?"★"+rat:"—",C.AM]].map(([v,c])=>(

                {tr.courseIds.slice(0,3).map(cid=>{const co=courses.find(x=>x.id===cid);return co?<div key={cid} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>

                return <tr key={s.id} style={{borderBottom:"1px solid "+C.LN,background:i%2?"#fff":C.BG}}>
                  <td style={{padding:"9px 11px",fontSize:12,fontWeight:700,color:C.N}}>{s.date}</td>
                  <td style={{padding:"9px 11px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><Av name={tr?.name||"?"} size={24}/><span style={{fontSize:12,fontWeight:700,color:C.N}}>{tr?.name||"—"}</span></div></td>
                  <td style={{padding:"9px 11px"}}>{co&&<span style={{fontSize:10,background:(CAT[co.category]||C.BL)+"18",color:CAT[co.category]||C.BL,padding:"2px 6px",borderRadius:3,fontWeight:700}}>{co.code}</span>}</td>
                  <td style={{padding:"9px 11px",fontSize:11,color:C.MU}}>{s.location}</td>
                  <td style={{padding:"9px 11px",fontWeight:700,color:C.N,textAlign:"center"}}>{s.attendees}</td>
                  <td style={{padding:"5px 11px"}}>
                    <button onClick={()=>sr(s)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 7px",borderRadius:7,fontFamily:"inherit"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.AMB} onMouseLeave={e=>e.currentTarget.style.background="none"}>
                      {s.ratingCount>0?<span style={{fontWeight:700,color:C.AM,fontSize:13}}>★ {s.rating} <span style={{fontSize:11,color:C.MU,fontWeight:400}}>({s.ratingCount})</span></span>:<span style={{fontSize:11,color:C.MU}}>— ให้คะแนน</span>}
                    </button>
                  </td>
                </tr>;})}
              {past.length===0&&<tr><td colSpan={6} style={{padding:30,textAlign:"center",color:C.MU}}>ยังไม่มีข้อมูล</td></tr>}
            </tbody>
          </table>
        </div>
      </div>}

      {/* LEADERBOARD */}
      {tab==="lb"&&<div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800,color:C.N}}>🏆 Leaderboard</h2>
          <p style={{margin:"3px 0 0",color:C.MU,fontSize:12}}>ชั่วโมงสอน 30% · Feedback 30% · เซอร์ 20% · สมรรถนะ 20%</p>
        </div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:10,marginBottom:28}}>
          {[ranked[1],ranked[0],ranked[2]].map((t,pi)=>{
            if(!t)return <div key={pi} style={{width:120}}/>;
            const pos=[2,1,3][pi];const ht=[130,170,90][pi];const sc=tScore(t,sessions,courses);
            return <div key={t.id} onClick={()=>sp(t)} style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",width:120}}>
              <div style={{fontSize:24,marginBottom:3}}>{M[[1,0,2][pi]]}</div>
              <Av name={t.name} size={44}/>
              <div style={{fontWeight:700,fontSize:11,color:C.N,marginTop:5,textAlign:"center"}}>{t.name}</div>
              <div style={{fontSize:11,color:C.MU}}>{t.dept}</div>
              <div style={{background:C.N,borderRadius:"7px 7px 0 0",width:"100%",height:ht,marginTop:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>#{pos}</div>
                <div style={{fontSize:14,fontWeight:700,color:C.G}}>{sc}pt</div>
              </div>
            </div>;
          })}
        </div>
        <div style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid "+C.LN}}>
          {ranked.map((t,i)=>{const sc=tScore(t,sessions,courses);const rat=avgR(sessions,t.id);
            return <div key={t.id} onClick={()=>sp(t)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderBottom:"1px solid "+C.LN,cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.BG} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:28,textAlign:"center",fontWeight:700,fontSize:i<3?20:13,color:i<3?C.G:C.MU}}>{i<3?M[i]:"#"+(i+1)}</div>
              <Av name={t.name} size={38}/>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:C.N}}>{t.name}</div><div style={{fontSize:11,color:C.MU}}>{t.dept}</div></div>
              <div style={{display:"flex",gap:5}}>
                <span style={{fontSize:10,background:C.BLB,color:C.BL,padding:"2px 6px",borderRadius:99,fontWeight:700}}>{sessions.filter(s=>s.trainerId===t.id).length} class</span>
                {rat&&<span style={{fontSize:10,background:C.AMB,color:C.AM,padding:"2px 6px",borderRadius:99,fontWeight:700}}>★{rat}</span>}
              </div>
              <div style={{width:72,flexShrink:0}}>
                <div style={{textAlign:"right",fontSize:13,fontWeight:700,color:C.G,marginBottom:2}}>{sc}pt</div>
                <div style={{height:4,background:C.LN,borderRadius:99}}><div style={{height:"100%",width:Math.min(sc,100)+"%",background:C.G,borderRadius:99}}/></div>
              </div>
            </div>;})}
        </div>
      </div>}
      <div style={{textAlign:"center",padding:"20px 0 10px",color:C.MU,fontSize:10}}>© DENSO TEN (THAILAND) · Certified Trainer Registry</div>
    </div>

    {/* Profile Modal */}
    {profile&&<Modal onClose={()=>sp(null)}>
      <MHead title="โปรไฟล์วิทยากร" onClose={()=>sp(null)}/>
      <div style={{padding:18}}>
        <div style={{display:"flex",gap:12,marginBottom:14}}><Av name={profile.name} size={56}/>
          <div><div style={{fontWeight:800,fontSize:17,color:C.N}}>{profile.name}</div><div style={{fontSize:12,color:C.MU}}>{profile.dept}</div>{profile.bio&&<div style={{fontSize:11,color:"#555",marginTop:3,fontStyle:"italic"}}>"{profile.bio}"</div>}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:14}}>
          {[[sessions.filter(s=>s.trainerId===profile.id).length,"Class",C.BL],[totalH(sessions,courses,profile.id)+"h","ชม.",C.GR],[avgR(sessions,profile.id)||"—","★",C.AM]].map(([v,lb,c])=>(
            <div key={lb} style={{background:C.BG,borderRadius:7,padding:"7px 3px",textAlign:"center",border:"1px solid "+C.LN}}>
              <div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:10,color:C.MU}}>{lb}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:12}}>
          {profile.courseIds.map(cid=>{const co=courses.find(x=>x.id===cid);if(!co)return null;const m=mLeft(profile.certDate,co.renewMonths),s=eb(m);
            return <div key={cid} style={{background:C.BG,borderRadius:7,padding:10,marginBottom:7,border:"1px solid "+C.LN}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><span style={{fontSize:10,color:CAT[co.category]||C.BL,fontWeight:700}}>{co.code}</span><div style={{fontSize:13,fontWeight:700,color:C.N}}>{co.name}</div></div>
                <span style={{fontSize:10,background:s.bg,color:s.c,padding:"2px 7px",borderRadius:99,fontWeight:700}}>{s.lb}</span>
              </div>
            </div>;})}
        </div>
        <div style={{marginBottom:14}}>
          {COMP.map(k=>{const v=profile.competencies?.[k]||0;return(
            <div key={k} style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
                <span style={{color:"#333"}}>{k}</span><span style={{fontWeight:700,color:C.G}}>{v}/5</span>
              </div>
              <div style={{height:5,background:C.LN,borderRadius:99}}><div style={{height:"100%",width:(v/5*100)+"%",background:C.G,borderRadius:99}}/></div>
            </div>);})}
        </div>
        <button onClick={()=>{sp(null);setTimeout(()=>sb(profile),30);}} style={{width:"100%",padding:10,borderRadius:8,border:"none",cursor:"pointer",background:C.N,color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>📅 ขอจองวิทยากรคนนี้</button>
      </div>
    </Modal>}

    {/* Booking Modal */}
    {book&&<Modal onClose={()=>sb(null)}>
      <MHead title="📅 ขอจองวิทยากร" onClose={()=>sb(null)}/>
      <BookingForm trainer={book} courses={courses} onClose={()=>sb(null)} onSave={saveBook}/>
    </Modal>}

    {/* Rating Modal */}
    {rate&&<RatingModal sess={rate} courses={courses} trainers={trainers} ratings={ratings} onClose={()=>sr(null)} onSubmit={submitRating}/>}

    {/* HRD */}
    {hrd&&<HRD data={D} setData={sD} onClose={()=>sh(false)}/>}

    {/* Book OK */}
    {bookOK&&<div onClick={()=>sbOK(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,padding:24,textAlign:"center",maxWidth:300}}>
        <div style={{fontSize:44,marginBottom:10}}>🎉</div>
        <div style={{fontSize:16,fontWeight:800,color:C.N,marginBottom:6}}>ส่งคำขอสำเร็จ</div>
        <div style={{background:C.GL,borderRadius:8,padding:"6px 16px",display:"inline-block",marginBottom:10}}>
          <div style={{fontSize:10,color:C.MU}}>เลขที่</div>
          <div style={{fontSize:20,fontWeight:800,color:C.N,letterSpacing:2}}>{bookOK}</div>
        </div>
        <div style={{fontSize:12,color:C.MU,marginBottom:14}}>HRD จะติดต่อกลับเพื่อยืนยัน</div>
        <Btn onClick={()=>sbOK(null)} style={{padding:"8px 22px"}}>ตกลง</Btn>
      </div>
    </div>}

    {/* PIN Modal */}
    {pin&&<div onClick={e=>e.target===e.currentTarget&&spm(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:14,overflow:"hidden",maxWidth:300,width:"100%"}}>
        <MHead title="🔐 เข้าสู่ระบบ HRD" onClose={()=>spm(false)}/>
        <div style={{padding:22,textAlign:"center"}}>
          <div style={{fontSize:12,color:C.MU,marginBottom:10}}>กรอก PIN 4 หลัก</div>
          <input type="password" value={pv} onChange={e=>{spv(e.target.value);spe(false);}}
            onKeyDown={e=>e.key==="Enter"&&(pv===PIN?(spm(false),sh(true),spv("")):(spe(true),spv("")))}
            style={{...IS,textAlign:"center",fontSize:22,letterSpacing:8,width:140,margin:"0 auto 6px"}} maxLength={6} placeholder="••••" autoFocus/>
          {pe&&<div style={{color:C.RD,fontSize:11,marginBottom:6}}>PIN ไม่ถูกต้อง</div>}
          <div style={{display:"flex",gap:7,justifyContent:"center",marginTop:10}}>
            <button onClick={()=>spm(false)} style={{padding:"7px 14px",borderRadius:7,border:"1.5px solid "+C.LN,background:"transparent",cursor:"pointer",fontFamily:"inherit",color:C.MU}}>ยกเลิก</button>
            <Btn onClick={()=>pv===PIN?(spm(false),sh(true),spv("")):(spe(true),spv(""))}>เข้าสู่ระบบ</Btn>
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

function BookingForm({trainer,courses,onClose,onSave}){
  const [f,sf]=useState({trainerId:trainer.id,courseId:trainer.courseIds[0]||"",date:"",dept:"",name:"",attendees:"",contact:""});
  const set=(k,v)=>sf(x=>({...x,[k]:v}));const ok=f.courseId&&f.date&&f.dept&&f.name;
  return <div style={{padding:18}}>
    <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:13,paddingBottom:11,borderBottom:"1px solid "+C.LN}}>
      <Av name={trainer.name} size={36}/><div><div style={{fontWeight:700,color:C.N}}>{trainer.name}</div><div style={{fontSize:11,color:C.MU}}>{trainer.dept}</div></div>
    </div>
    <FL label="หลักสูตร" req>
      <select style={IS} value={f.courseId} onChange={e=>set("courseId",e.target.value)}>
        {trainer.courseIds.map(cid=>{const co=courses.find(x=>x.id===cid);return co?<option key={cid} value={cid}>{co.code} — {co.name}</option>:null;})}
      </select>
    </FL>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
      <FL label="วันที่" req><input style={IS} type="date" value={f.date} onChange={e=>set("date",e.target.value)}/></FL>
      <FL label="จำนวนคน"><input style={IS} type="number" value={f.attendees} onChange={e=>set("attendees",e.target.value)}/></FL>
      <FL label="ผู้ขอ" req><input style={IS} value={f.name} onChange={e=>set("name",e.target.value)}/></FL>
      <FL label="แผนก" req><input style={IS} value={f.dept} onChange={e=>set("dept",e.target.value)}/></FL>
    </div>
    <FL label="ติดต่อ"><input style={IS} value={f.contact} onChange={e=>set("contact",e.target.value)} placeholder="เบอร์ / LINE / Email"/></FL>
    <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:6}}>
      <button onClick={onClose} style={{padding:"7px 14px",borderRadius:7,border:"1.5px solid "+C.LN,background:"transparent",cursor:"pointer",fontFamily:"inherit",color:C.MU}}>ยกเลิก</button>
      <Btn onClick={()=>ok&&onSave(f)} disabled={!ok}>📩 ส่งคำขอ</Btn>
    </div>
  </div>;
}

function RatingModal({sess,courses,trainers,ratings,onClose,onSubmit}){
  const co=courses.find(c=>c.id===sess.courseId);const tr=trainers.find(t=>t.id===sess.trainerId);
  const [stars,ss]=useState(0);const [hover,sh]=useState(0);const [comment,sc]=useState("");
  const dk=devKey();const already=ratings.some(r=>r.sessionId===sess.id&&r.deviceKey===dk);
  const lbl=["","😕 ต้องปรับปรุง","😐 พอใช้","🙂 ดี","😊 ดีมาก","🤩 ยอดเยี่ยม"];
  return <Modal onClose={onClose}>
    <MHead title="⭐ ให้คะแนนวิทยากร" onClose={onClose}/>
    <div style={{padding:18}}>
      <div style={{display:"flex",gap:11,alignItems:"center",marginBottom:14,paddingBottom:12,borderBottom:"1px solid "+C.LN}}>
        <Av name={tr?.name||"?"} size={42}/><div>
          <div style={{fontWeight:700,color:C.N,fontSize:14}}>{tr?.name}</div>
          <div style={{fontSize:12,color:CAT[co?.category]||C.BL,fontWeight:600}}>{co?.name}</div>
          <div style={{fontSize:11,color:C.MU}}>📅 {sess.date} · 📍 {sess.location}</div>
        </div>
        {sess.ratingCount>0&&<div style={{marginLeft:"auto",textAlign:"center",background:C.AMB,borderRadius:9,padding:"5px 11px",flexShrink:0}}>
          <div style={{fontSize:10,color:C.AM}}>คะแนนปัจจุบัน</div>
          <div style={{fontSize:18,fontWeight:700,color:C.AM}}>★ {sess.rating}</div>
          <div style={{fontSize:10,color:C.AM}}>({sess.ratingCount})</div>
        </div>}
      </div>
      {already?<div style={{textAlign:"center",padding:"18px 0"}}>
        <div style={{fontSize:38,marginBottom:7}}>✅</div>
        <div style={{fontWeight:700,color:C.N,fontSize:14,marginBottom:5}}>คุณให้คะแนน Session นี้แล้ว</div>
        <div style={{fontSize:12,color:C.MU,marginBottom:14}}>1 เครื่องให้คะแนนได้ 1 ครั้ง</div>
        <Btn onClick={onClose}>ปิด</Btn>
      </div>:<div>
        <div style={{textAlign:"center",marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:C.N}}>การอบรมครั้งนี้เป็นประโยชน์แค่ไหน?</div></div>
        <div style={{display:"flex",justifyContent:"center",gap:5,marginBottom:5}}>
          {[1,2,3,4,5].map(v=><button key={v} onClick={()=>ss(v)} onMouseEnter={()=>sh(v)} onMouseLeave={()=>sh(0)}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:40,lineHeight:1,transform:(hover||stars)>=v?"scale(1.2)":"scale(1)",transition:"transform .1s",filter:(hover||stars)>=v?"none":"grayscale(1) opacity(.3)"}}>⭐</button>)}
        </div>
        <div style={{textAlign:"center",height:22,marginBottom:12,fontSize:13,fontWeight:700,color:C.AM}}>{(hover||stars)>0&&lbl[hover||stars]}</div>
        <textarea value={comment} onChange={e=>sc(e.target.value)} placeholder="ความคิดเห็น (ไม่บังคับ)" style={{...IS,minHeight:65,resize:"vertical",marginBottom:12}}/>
        <div style={{display:"flex",gap:7}}>
          <button onClick={onClose} style={{flex:1,padding:9,borderRadius:7,border:"1.5px solid "+C.LN,background:"transparent",color:C.MU,cursor:"pointer",fontFamily:"inherit"}}>ยกเลิก</button>
          <Btn onClick={()=>stars&&onSubmit(sess.id,stars,comment,dk)} disabled={!stars} style={{flex:2,padding:9}}>
            {stars?"📩 ส่งคะแนน":"เลือกคะแนนก่อน"}
          </Btn>
        </div>
      </div>}
    </div>
  </Modal>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
